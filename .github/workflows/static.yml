name: Update Wrestler Scores
on:
  schedule:
    - cron: "*/0.5 * * * *" # alle 30 Sekunden
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update JSON
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'wrestlers.json';
          let data = JSON.parse(fs.readFileSync(path));
          data.forEach(w => {
            const delta = Math.random()*2; // Zufall
            w.score = Math.round((w.score + delta) *100)/100;
            if(delta>1) w.hot = (w.hot||0)+1; else w.hot=0;
          });
          fs.writeFileSync(path, JSON.stringify(data,null,2));
          EOF
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add wrestlers.json
          git commit -m "Auto-update scores"
          git push
