
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrestler Index</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

<style>

body{
background:#0f1115;
color:#e4e6eb;
font-family:system-ui;
display:flex;
justify-content:center;
padding:30px 10px;
}

.container{
width:460px;
max-width:95vw;
}

/* HEADER */

.header-row{
display:grid;
grid-template-columns:70px 1fr 120px 100px;
font-size:12px;
color:#7d8596;
margin-bottom:8px;
padding:0 10px;
}

/* LIST */

#ranking{
position:relative;
list-style:none;
padding:0;
margin:0;
}

.rank-item{
position:absolute;
width:100%;
height:72px;
background:#1a1d23;
border:1px solid #2a2f37;
border-radius:10px;
display:grid;
grid-template-columns:70px 1fr 120px 100px;
align-items:center;
padding:0 10px;
transition:top .7s ease;
overflow:hidden;
}

/* TOP 3 */

.gold-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(255,215,0,0.15) 100%);}
.silver-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(192,192,192,0.15) 100%);}
.bronze-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(205,127,50,0.15) 100%);}

.place{
font-weight:700;
color:#7d8596;
}

.place.gold{color:#ffd700;}
.place.silver{color:#c0c0c0;}
.place.bronze{color:#cd7f32;}

/* SUPERSTAR */

.coin{
font-size:18px;
font-weight:700;
background:#20242d;
padding:4px 8px;
border-radius:6px;
display:inline-block;
}

/* HOT */

.hot-pill{
background:rgba(255,106,0,0.15);
border-radius:6px;
padding:2px 6px;
color:#ff6a00;
font-size:11px;
margin-left:8px;
display:inline-flex;
align-items:center;
gap:4px;
animation:flamePulse 1s infinite alternate;
}

@keyframes flamePulse{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

/* TREND */

.trend-box{
display:flex;
align-items:center;
gap:6px;
}

.spark{
width:70px;
height:24px;
}

.trend{
font-size:18px;
}

.up{color:#22c55e;}
.down{color:#ef4444;}
.flat{color:#9aa4b2;}

/* SCORE */

.score{
font-size:20px;
font-weight:700;
text-align:right;
}

/* FLASH */

.flash-up::before,
.flash-down::before{
content:"";
position:absolute;
left:-140%;
top:0;
width:140%;
height:100%;
}

.flash-up::before{
background:linear-gradient(90deg,transparent,rgba(34,197,94,.35),transparent);
animation:flashMove 2s ease;
}

.flash-down::before{
background:linear-gradient(90deg,transparent,rgba(255,60,60,.45),transparent);
animation:flashMove 2s ease;
}

@keyframes flashMove{
from{left:-140%;}
to{left:140%;}
}

</style>
</head>

<body>

<div class="container">

<div class="header-row">
<div>RANK</div>
<div>SUPERSTAR</div>
<div>TREND</div>
<div style="text-align:right">POP SCORE</div>
</div>

<ul id="ranking"></ul>

</div>

<script>

const ITEM_HEIGHT=72
const GAP=6
const ROW_HEIGHT=ITEM_HEIGHT+GAP

let wrestlers=[

{code:'ROMN',score:0,hot:0,history:[]},
{code:'SETH',score:0,hot:0,history:[]},
{code:'PUNK',score:0,hot:0,history:[]},
{code:'BRWN',score:0,hot:0,history:[]},
{code:'AJST',score:0,hot:0,history:[]},
{code:'REY',score:0,hot:0,history:[]},
{code:'KANE',score:0,hot:0,history:[]},
{code:'MIZA',score:0,hot:0,history:[]},
{code:'TRPL',score:0,hot:0,history:[]},
{code:'CODY',score:0,hot:0,history:[]},
{code:'LASH',score:0,hot:0,history:[]},
{code:'DREW',score:0,hot:0,history:[]}

]

const list=document.getElementById("ranking")
list.style.height=wrestlers.length*ROW_HEIGHT+"px"

/* CREATE ROWS */

wrestlers.forEach((w,i)=>{

const li=document.createElement("li")
li.className="rank-item"
li.style.top=i*ROW_HEIGHT+"px"
li.id=w.code

li.innerHTML=`

<div class="place">#${i+1}</div>

<div>
<span class="coin">$${w.code}</span>
<span class="hot"></span>
</div>

<div class="trend-box">
<svg class="spark"></svg>
<span class="trend"></span>
</div>

<div class="score">0.00</div>

`

list.appendChild(li)

})

/* SPARKLINE */

function drawSparkline(svg,data){

const w=70
const h=24

svg.setAttribute("viewBox","0 0 "+w+" "+h)

if(data.length<2)return

const max=Math.max(...data)
const min=Math.min(...data)

let points=""

data.forEach((v,i)=>{

let x=i*(w/(data.length-1))
let y=h-((v-min)/(max-min||1))*h

points+=x+","+y+" "

})

svg.innerHTML=`<polyline points="${points}" fill="none" stroke="#4ade80" stroke-width="2"/>`

}

/* FLASH */

function triggerFlash(el,type){

el.classList.remove("flash-up","flash-down")
void el.offsetWidth
el.classList.add(type)

setTimeout(()=>{el.classList.remove(type)},2000)

}

/* UPDATE */

function updateRanking(newScores){

const oldScores={}
wrestlers.forEach(w=>oldScores[w.code]=w.score)

wrestlers.forEach(w=>{
if(newScores[w.code]!=undefined){
w.score=newScores[w.code]
w.history.push(w.score)
if(w.history.length>20)w.history.shift()
}
})

wrestlers.sort((a,b)=>b.score-a.score)

wrestlers.forEach((w,index)=>{

const li=document.getElementById(w.code)

li.style.top=index*ROW_HEIGHT+"px"
li.classList.remove("gold-bg","silver-bg","bronze-bg")

const placeEl=li.querySelector(".place")
const scoreEl=li.querySelector(".score")
const hotEl=li.querySelector(".hot")
const spark=li.querySelector(".spark")
const trendEl=li.querySelector(".trend")

placeEl.textContent="#"+(index+1)
placeEl.classList.remove("gold","silver","bronze")

if(index===0){placeEl.classList.add("gold");li.classList.add("gold-bg")}
else if(index===1){placeEl.classList.add("silver");li.classList.add("silver-bg")}
else if(index===2){placeEl.classList.add("bronze");li.classList.add("bronze-bg")}

scoreEl.textContent=w.score.toFixed(2)

/* TREND */

let trend=0
if(w.score>oldScores[w.code])trend=1
if(w.score<oldScores[w.code])trend=-1

if(trend===1){
trendEl.innerHTML='<span class="up">▲</span>'
triggerFlash(li,"flash-up")
w.hot++
}
else if(trend===-1){
trendEl.innerHTML='<span class="down">▼</span>'
triggerFlash(li,"flash-down")
w.hot=0
}
else{
trendEl.innerHTML='<span class="flat">=</span>'
}

/* HOT COUNTER */

if(w.hot>1){
hotEl.innerHTML=`<span class="hot-pill"><i class="fa-solid fa-fire"></i> HOT x${w.hot}</span>`
}else{
hotEl.innerHTML=""
}

/* SPARK */

drawSparkline(spark,w.history)

})

}

/* RANDOM TEST */

function randomUpdate(){

const scores={}

wrestlers.forEach(w=>{

const delta=(Math.random()*0.6-0.3)
let score=w.score+delta

score=Math.max(0,score)

scores[w.code]=score

})

updateRanking(scores)

}

setInterval(randomUpdate,10000)

</script>

</body>
</html>
