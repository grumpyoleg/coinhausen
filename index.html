<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA: BALANCED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { background: #020617; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; touch-action: manipulation; color: #f1f5f9; }
        #game-viewport { position: relative; width: 92vw; height: 92vw; max-width: 480px; max-height: 480px; background: #0f172a; border-radius: 20px; border: 2px solid #334155; overflow: hidden; }
        #grid-container { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); width: 100%; height: 100%; gap: 8px; padding: 12px; z-index: 10; position: relative; }
        .tile { background: rgba(30, 41, 59, 0.5); border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #1e293b; transition: transform 0.1s; }
        .tile:active { transform: scale(0.95); }
        .energy-danger { color: #f87171; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .growth-inner { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #064e3b, #10b981); transition: height 0.3s ease; z-index: 2; }
        .health-bar { position: absolute; top: 0; left: 0; height: 4px; background: #ef4444; z-index: 5; opacity: 0; width: 100%; }
        .tile.planted .health-bar { opacity: 1; }
        .plant-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; opacity: 0; transition: 0.3s; z-index: 3; }
        .tile.planted .plant-icon, .matured .plant-icon, .dead .plant-icon { opacity: 1; }
        .weather-unit { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.4; pointer-events: none; z-index: 20; transform: translate(-50%, -50%); }
        #xp-bar { height: 100%; width: 0%; background: #6366f1; transition: width 0.3s; }
        .overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; backdrop-blur: md; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[480px] flex justify-between items-end mb-4 px-2">
        <div>
            <h1 class="text-xl font-black italic text-white tracking-tighter">AURA_OS</h1>
            <p id="lvl-txt" class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">Level 1</p>
        </div>
        <div class="text-right">
            <p class="text-[9px] font-bold text-slate-500 uppercase">Energy</p>
            <p id="pts" class="text-3xl font-black">100</p>
        </div>
    </div>

    <div id="game-viewport">
        <div id="grid-container"></div>
        <div id="sun" class="weather-unit bg-yellow-400 w-32 h-32"></div>
        <div id="cloud" class="weather-unit bg-blue-500 w-28 h-28"></div>
    </div>

    <div class="w-full max-w-[480px] h-1.5 bg-slate-800 rounded-full mt-6 overflow-hidden">
        <div id="xp-bar"></div>
    </div>

    <div class="w-full max-w-[480px] mt-4 flex justify-between items-center px-2">
        <p id="status-hint" class="text-[10px] uppercase font-bold text-slate-500 italic">Steady flow detected</p>
        <p id="high-rank" class="text-[10px] uppercase font-bold text-emerald-500">Best: Rank 0</p>
    </div>

    <div id="lvl-overlay" class="hidden overlay bg-slate-950/98">
        <h2 class="text-2xl font-black text-white italic mb-1 uppercase">Upgrade Selection</h2>
        <div id="card-wrap" class="flex flex-col gap-3 w-full max-w-xs mt-6"></div>
    </div>

    <script>
        const GRID_SIZE = 5;
        const SEED_COST = 15;
        const container = document.getElementById('grid-container');
        const tiles = [];
        
        // --- NEW BALANCED STATS ---
        let points = 100, xp = 0, xpNext = 120, level = 1, isPaused = false;
        let perks = { sun: 2.5, rain: 1.8, reward: 25, drainBase: 0.03, maxH: 100 };

        let highRank = localStorage.getItem('aura-high-rank') || 0;
        document.getElementById('high-rank').innerText = `Best: Rank ${highRank}`;

        const UPGRADES = [
            { id: 'S', n: 'HELIO-MAX', d: 'Sun efficiency +50%', i: '☀️' },
            { id: 'R', n: 'STORM-NODE', d: 'Rain efficiency +50%', i: '🌧️' },
            { id: 'V', n: 'VOID-CELL', d: 'Harvest +12 Energy', i: '💎' },
            { id: 'L', n: 'BIO-CORE', d: 'Max Health +60 / Drain -20%', i: '🛡️' }
        ];

        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const el = document.createElement('div'); el.className = 'tile';
            const inner = document.createElement('div'); inner.className = 'growth-inner';
            const hBar = document.createElement('div'); hBar.className = 'health-bar';
            const icon = document.createElement('div'); icon.className = 'plant-icon'; icon.innerHTML = '🌱';
            el.append(hBar, inner, icon);
            const obj = { el, inner, hBar, icon, status: 'empty', growth: 0, health: 100 };
            el.addEventListener('pointerdown', () => {
                if (isPaused) return;
                if (obj.status === 'empty') {
                    if (points >= SEED_COST) {
                        points -= SEED_COST; obj.status = 'growing'; el.classList.add('planted'); obj.health = perks.maxH;
                    } else {
                        // SCAVENGE BUFFED (+2)
                        points += 2;
                        document.getElementById('status-hint').innerText = "Scavenging +2 Energy...";
                    }
                    updateUI();
                }
            });
            container.appendChild(el); tiles.push(obj);
        }

        let weather = { sun: { x: 50, y: 50, vx: 1.5, vy: 1.2, r: 18 }, cloud: { x: 300, y: 300, vx: -1.3, vy: 1.7, r: 15 } };

        function gameLoop() {
            if (isPaused) return requestAnimationFrame(gameLoop);
            moveWeather('sun'); moveWeather('cloud');

            let activeCount = tiles.filter(t => t.status === 'growing' || t.status === 'matured').length;
            
            // SMARTER SCALING: Drain increases much slower at Level 4
            let adaptiveDrain = (perks.drainBase + (level * 0.025)) * (1 + (activeCount * 0.06));

            tiles.forEach(t => {
                const sHit = isUnder(t, 'sun'), cHit = isUnder(t, 'cloud');
                if (t.status === 'growing') {
                    if (!sHit && !cHit) t.health -= adaptiveDrain;
                    else t.health = Math.min(perks.maxH, t.health + 0.8);

                    let rate = 0.09; // Faster base growth
                    if (sHit) { rate *= perks.sun; t.el.classList.add('hit-sun'); } else t.el.classList.remove('hit-sun');
                    if (cHit) { rate *= perks.rain; t.el.classList.add('hit-cloud'); } else t.el.classList.remove('hit-cloud');
                    
                    t.growth += rate;
                    t.inner.style.height = t.growth + '%';
                    t.hBar.style.width = (t.health / perks.maxH * 100) + '%';

                    if (t.health <= 0) { t.status = 'dead'; t.regen = 100; t.el.className = 'tile dead'; t.icon.innerHTML = '💀'; }
                    if (t.growth >= 100) {
                        t.status = 'matured'; t.el.classList.add('matured'); t.icon.innerHTML = '✨';
                        setTimeout(() => { if (t.status === 'matured') { points += perks.reward; xp += 40; updateXP(); reset(t); } }, 400);
                    }
                } else if (t.status === 'dead') {
                    t.regen -= (0.4 * (sHit || cHit ? 4 : 1));
                    t.inner.style.height = t.regen + '%';
                    if (t.regen <= 0) reset(t);
                }
            });
            checkEnergyState(activeCount);
            requestAnimationFrame(gameLoop);
        }

        function checkEnergyState(activePlants) {
            const ptsEl = document.getElementById('pts');
            if (points < SEED_COST) {
                ptsEl.classList.add('energy-danger');
                if (activePlants === 0) document.getElementById('status-hint').innerText = "OUT OF ENERGY: TAP TILES TO SCAVENGE";
            } else {
                ptsEl.classList.remove('energy-danger');
                if (activePlants > 0) document.getElementById('status-hint').innerText = "Nurture your crops";
                else document.getElementById('status-hint').innerText = "Ready to plant";
            }
        }

        function moveWeather(id) {
            let w = weather[id], v = document.getElementById('game-viewport').offsetWidth;
            w.x += w.vx; w.y += w.vy;
            if (w.x > v || w.x < 0) w.vx *= -1; if (w.y > v || w.y < 0) w.vy *= -1;
            document.getElementById(id).style.left = w.x + 'px'; document.getElementById(id).style.top = w.y + 'px';
        }

        function isUnder(tile, wId) {
            const w = weather[wId], v = document.getElementById('game-viewport').offsetWidth;
            const idx = tiles.indexOf(tile);
            const tx = ((idx % GRID_SIZE) / GRID_SIZE * v) + (v / 10);
            const ty = (Math.floor(idx / GRID_SIZE) / GRID_SIZE * v) + (v / 10);
            const dx = tx - w.x, dy = ty - w.y;
            return Math.sqrt(dx*dx + dy*dy) < (w.r / 100) * v;
        }

        function updateXP() {
            if (xp >= xpNext) {
                isPaused = true;
                document.getElementById('lvl-overlay').classList.remove('hidden');
                const wrap = document.getElementById('card-wrap'); wrap.innerHTML = '';
                [...UPGRADES].sort(()=>.5-Math.random()).slice(0,3).forEach(u => {
                    const c = document.createElement('div');
                    c.className = 'bg-slate-900 border border-slate-700 p-3 rounded-xl flex items-center gap-4 cursor-pointer hover:border-indigo-500';
                    c.innerHTML = `<div class="text-2xl">${u.i}</div><div><div class="font-bold text-[11px] uppercase text-white">${u.n}</div><div class="text-[9px] text-slate-500">${u.d}</div></div>`;
                    c.onclick = () => {
                        if(u.id === 'S') perks.sun += 1.0; if(u.id === 'R') perks.rain += 0.8;
                        if(u.id === 'V') perks.reward += 12; if(u.id === 'L') { perks.maxH += 60; perks.drainBase *= 0.8; }
                        level++; xp = 0; xpNext += 60; isPaused = false;
                        document.getElementById('lvl-overlay').classList.add('hidden');
                        if (level > highRank) { highRank = level; localStorage.setItem('aura-high-rank', highRank); document.getElementById('high-rank').innerText = `Best: Rank ${highRank}`; }
                        updateUI();
                    };
                    wrap.appendChild(c);
                });
            }
            document.getElementById('xp-bar').style.width = (xp / xpNext * 100) + '%';
        }

        function reset(t) { t.status = 'empty'; t.growth = 0; t.health = perks.maxH; t.inner.style.height = '0%'; t.el.className = 'tile'; t.icon.innerHTML = '🌱'; t.hBar.style.width = '0%'; updateUI(); }
        function updateUI() { document.getElementById('pts').innerText = Math.floor(points); document.getElementById('lvl-txt').innerText = `Level ${level}`; }

        gameLoop();
    </script>
</body>
</html>
