<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrestler Market</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
<style>
body{
  background:linear-gradient(135deg,#0f1115,#1a1d23);
  color:#e4e6eb;
  font-family:system-ui;
  min-height:100vh;
  margin:0;
  display:flex;
  justify-content:center;
  padding:30px 10px;
}
.title{text-align:center;color:#9aa4b2;margin-bottom:20px;}
#ranking{position:relative;list-style:none;padding:0;margin:0;width:360px;max-width:95vw;}
.rank-item{
  position:absolute;width:100%;height:64px;background:#1a1d23;border:1px solid #2a2f37;
  border-radius:8px;display:flex;align-items:center;padding:0 16px;gap:10px;transition:top .7s ease;overflow:hidden;
}
.gold-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(255,215,0,0.15) 100%);}
.silver-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(192,192,192,0.15) 100%);}
.bronze-bg{background:linear-gradient(90deg,#1a1d23 0%,rgba(205,127,50,0.15) 100%);}
.place{min-width:34px;font-weight:600;color:#7d8596;}
.place.gold{color:#ffd700;}
.place.silver{color:#c0c0c0;}
.place.bronze{color:#cd7f32;}
.code{display:flex;align-items:center;gap:6px;font-weight:500;}
.hot-pill{width:28px;height:28px;background:rgba(255,106,0,0.15);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#ff6a00;font-size:14px;animation:flamePulse 1s infinite alternate;}
@keyframes flamePulse{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
.score{margin-left:auto;min-width:60px;text-align:right;}
.trend{width:24px;text-align:center;font-size:18px;}
.arrow-up{color:#22c55e;}
.arrow-down{color:#ef4444;}
.arrow-flat{color:#9aa4b2;}
.flash-up::before,.flash-down::before{content:"";position:absolute;left:-140%;top:0;width:140%;height:100%;}
.flash-up::before{background:linear-gradient(90deg,transparent,rgba(34,197,94,.35),transparent);animation:flashMove 2s ease;}
.flash-down::before{background:linear-gradient(90deg,transparent,rgba(255,60,60,.45),transparent);animation:flashMove 2s ease;}
@keyframes flashMove{from{left:-140%;}to{left:140%;}}
@media(max-width:600px){.rank-item{height:56px;font-size:14px;}.place{min-width:30px;}.trend{width:20px;font-size:16px;}}
</style>
</head>
<body>
<div>
<h2 class="title">Wrestler Market</h2>
<ul id="ranking"></ul>
</div>
<script>
const GAP=5;
let ITEM_HEIGHT=window.innerWidth<600?56:64;
const ROW_HEIGHT=ITEM_HEIGHT+GAP;
const TOP_VISIBLE=10;
const JSON_URL="https://grumpyoleg.github.io/coinhausen/wrestlers.json"; // <- Pfad zu deiner GitHub JSON

const list=document.getElementById("ranking");

// JSON laden
async function loadWrestlers(){
  const res = await fetch(JSON_URL);
  const wrestlers = await res.json();
  list.style.height=wrestlers.length*ROW_HEIGHT+"px";

  wrestlers.forEach((w,i)=>{
    const li=document.createElement("li");
    li.className="rank-item";
    li.style.top=i*ROW_HEIGHT+"px";
    li.id=w.code;
    li.innerHTML=`
      <span class="place">#${i+1}</span>
      <span class="code">
        $${w.code}<span class="hot"></span>
      </span>
      <span class="score">${w.score.toFixed(2)}</span>
      <span class="trend"></span>
    `;
    list.appendChild(li);
  });

  updateRanking(wrestlers);
}

// Ranking rendern
function updateRanking(wrestlers){
  wrestlers.sort((a,b)=>b.score-a.score);
  wrestlers.forEach((w,index)=>{
    const li=document.getElementById(w.code);
    li.style.top=index*ROW_HEIGHT+"px";
    li.classList.remove("gold-bg","silver-bg","bronze-bg");
    const placeEl=li.querySelector(".place");
    const scoreEl=li.querySelector(".score");
    const trendEl=li.querySelector(".trend");
    const hotEl=li.querySelector(".hot");

    placeEl.textContent="#"+(index+1);
    placeEl.classList.remove("gold","silver","bronze");
    if(index===0){placeEl.classList.add("gold");li.classList.add("gold-bg");}
    else if(index===1){placeEl.classList.add("silver");li.classList.add("silver-bg");}
    else if(index===2){placeEl.classList.add("bronze");li.classList.add("bronze-bg");}

    scoreEl.textContent=w.score.toFixed(2);

    // Trend
    if(w.lastScore!==undefined){
      let trend=0;
      if(w.score>w.lastScore)trend=1;
      if(w.score<w.lastScore)trend=-1;
      if(trend===1){trendEl.innerHTML='<span class="arrow-up">▲</span>'; w.hot++; }
      else if(trend===-1){trendEl.innerHTML='<span class="arrow-down">▼</span>'; w.hot=0; }
      else{trendEl.innerHTML='<span class="arrow-flat">=</span>';}
    }

    hotEl.innerHTML = w.hot>0 ? `<span class="hot-pill"><i class="fa-solid fa-fire"></i></span>` : "";

    w.lastScore=w.score;
  });
}

// Initial
loadWrestlers();
</script>
</body>
</html>
