<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AURA_OS: LANDSCAPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { 
            background: #020617; font-family: 'JetBrains Mono', monospace; 
            margin: 0; overflow: hidden; touch-action: none; color: #f1f5f9;
            height: 100vh; width: 100vw; display: flex; 
        }

        /* Sidebar Layout */
        .sidebar { width: 200px; padding: 20px; display: flex; flex-direction: column; justify-content: center; z-index: 50; }
        
        #game-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }

        #grid-viewport { 
            position: relative; width: 450px; height: 450px; 
            background: #0f172a; border-radius: 12px; border: 2px solid #334155; overflow: hidden; 
        }

        .tile { border: 1px solid #1e293b; background: rgba(30, 41, 59, 0.4); position: relative; transition: 0.1s; }
        
        /* Cursor Highlight */
        .tile.selected { border: 3px solid #f1f5f9; box-shadow: inset 0 0 15px rgba(255,255,255,0.2); z-index: 10; transform: scale(1.05); }

        .growth-inner { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #064e3b, #10b981); pointer-events: none; transition: height 0.3s; }
        
        /* Virtual Controls */
        .controls-layer { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none; }
        .dpad, .action-btn { pointer-events: auto; }
        .btn { background: #1e293b; border: 2px solid #334155; width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; active:bg-indigo-600; }
        .action-btn .btn { width: 80px; height: 80px; border-radius: 50%; background: #312e81; color: white; border-color: #4338ca; font-size: 1.5rem; }

        .weather-unit { position: absolute; border-radius: 50%; filter: blur(30px); opacity: 0.4; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 class="text-2xl font-black italic mb-8">AURA_OS</h1>
        <span class="text-[10px] text-slate-500 uppercase font-bold">Energy</span>
        <p id="pts" class="text-4xl font-black text-white mb-6">100</p>
        <span class="text-[10px] text-slate-500 uppercase font-bold">System Level</span>
        <p id="lvl-num" class="text-2xl font-black text-indigo-400">1</p>
    </div>

    <div id="game-container">
        <div id="grid-viewport">
            <div id="grid-container" class="grid grid-cols-5 grid-rows-5 w-full h-full gap-2 p-3 relative z-10"></div>
            <div id="sun" class="weather-unit bg-yellow-400 w-24 h-24"></div>
            <div id="cloud" class="weather-unit bg-blue-500 w-24 h-24"></div>
        </div>
    </div>

    <div class="sidebar text-right">
        <div class="mb-6">
            <span class="text-[10px] text-slate-500 uppercase font-bold">Sync</span>
            <div class="h-2 w-full bg-slate-800 rounded-full mt-1"><div id="xp-bar" class="h-full bg-indigo-500 rounded-full" style="width: 0%"></div></div>
        </div>
        <div>
            <span class="text-[10px] text-slate-500 uppercase font-bold">Stability</span>
            <div class="h-2 w-full bg-slate-800 rounded-full mt-1"><div id="stab-bar" class="h-full bg-amber-600 rounded-full" style="width: 0%"></div></div>
        </div>
    </div>

    <div class="controls-layer">
        <div class="dpad grid grid-cols-3 gap-1">
            <div></div><button class="btn" onclick="moveCursor(0,-1)">▲</button><div></div>
            <button class="btn" onclick="moveCursor(-1,0)">◀</button><div></div><button class="btn" onclick="moveCursor(1,0)">▶</button>
            <div></div><button class="btn" onclick="moveCursor(0,1)">▼</button><div></div>
        </div>
        <div class="action-btn flex items-end">
            <button class="btn shadow-lg" onclick="pressX()">X</button>
        </div>
    </div>

    <div id="lvl-overlay" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center p-8 bg-slate-950/90 backdrop-blur-md">
        <h2 class="text-2xl font-black text-white italic mb-6">UPGRADE SELECT</h2>
        <div id="card-wrap" class="flex gap-4"></div>
    </div>

    <script>
        let pts = 100, xp = 0, xpNext = 100, lvl = 1, stab = 0, isPaused = false;
        let cursorIdx = 12; // Start in middle
        const tiles = [];
        const perks = { sun: 2.2, rain: 1.2, rew: 12 };

        // Init Grid
        const grid = document.getElementById('grid-container');
        for (let i = 0; i < 25; i++) {
            const el = document.createElement('div'); el.className = 'tile';
            const inner = document.createElement('div'); inner.className = 'growth-inner';
            el.appendChild(inner);
            const obj = { el, inner, status: 'empty', growth: 0 };
            tiles.push(obj); grid.appendChild(el);
        }

        function updateCursor() {
            tiles.forEach((t, i) => {
                t.el.classList.toggle('selected', i === cursorIdx);
            });
        }
        updateCursor();

        // Control Logic
        function moveCursor(dx, dy) {
            let x = cursorIdx % 5; let y = Math.floor(cursorIdx / 5);
            x = Math.max(0, Math.min(4, x + dx));
            y = Math.max(0, Math.min(4, y + dy));
            cursorIdx = y * 5 + x;
            updateCursor();
        }

        function pressX() {
            if (isPaused) return;
            const t = tiles[cursorIdx];
            if (t.status === 'empty' && pts >= 15) {
                pts -= 15; t.status = 'growing'; t.el.classList.add('planted');
            } else if (t.status === 'empty') {
                pts += 1; // Scavenge
            }
        }

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') moveCursor(0,-1);
            if (e.key === 'ArrowDown') moveCursor(0,1);
            if (e.key === 'ArrowLeft') moveCursor(-1,0);
            if (e.key === 'ArrowRight') moveCursor(1,0);
            if (e.key.toLowerCase() === 'x') pressX();
        });

        // Weather System
        let weather = { sun: { x: 50, y: 50, vx: 1.2, vy: 0.8 }, cloud: { x: 200, y: 200, vx: -0.8, vy: 1.1 } };

        function gameLoop() {
            if (isPaused) return requestAnimationFrame(gameLoop);

            // Stability decay
            if (stab > 0) stab -= 0.03; else stab = 0;

            // Move Weather
            ['sun', 'cloud'].forEach(id => {
                let w = weather[id]; w.x += w.vx; w.y += w.vy;
                if (w.x > 400 || w.x < 0) w.vx *= -1; if (w.y > 400 || w.y < 0) w.vy *= -1;
                document.getElementById(id).style.transform = `translate(${w.x}px, ${w.y}px)`;
            });

            // Growth Logic
            tiles.forEach(t => {
                if (t.status === 'growing') {
                    const idx = tiles.indexOf(t);
                    const tx = (idx % 5) * 90 + 45; const ty = Math.floor(idx / 5) * 90 + 45;
                    const sHit = Math.sqrt((tx-weather.sun.x-48)**2 + (ty-weather.sun.y-48)**2) < 60;
                    const cHit = Math.sqrt((tx-weather.cloud.x-48)**2 + (ty-weather.cloud.y-48)**2) < 60;
                    
                    let rate = 0.08;
                    if (sHit) rate *= perks.sun; if (cHit) rate *= perks.rain;
                    t.growth += rate;
                    t.inner.style.height = t.growth + '%';

                    if (t.growth >= 100) {
                        t.status = 'empty'; t.growth = 0; t.el.classList.remove('planted');
                        pts += (stab > 0) ? 22 : 12; xp += 34;
                        if (xp >= xpNext) triggerLevelUp();
                    }
                }
            });

            document.getElementById('pts').innerText = Math.floor(pts);
            document.getElementById('lvl-num').innerText = lvl;
            document.getElementById('xp-bar').style.width = (xp/xpNext*100)+'%';
            document.getElementById('stab-bar').style.width = stab + '%';
            
            requestAnimationFrame(gameLoop);
        }

        function triggerLevelUp() {
            isPaused = true; lvl++; xp = 0; xpNext += 20;
            const overlay = document.getElementById('lvl-overlay');
            overlay.classList.remove('hidden');
            const wrap = document.getElementById('card-wrap'); wrap.innerHTML = '';
            ['UPGRADE A', 'UPGRADE B'].forEach(txt => {
                let btn = document.createElement('button');
                btn.className = "bg-indigo-600 p-6 rounded-xl font-bold text-white";
                btn.innerText = txt;
                btn.onclick = () => {
                    stab = 100; isPaused = false; overlay.classList.add('hidden');
                };
                wrap.appendChild(btn);
            });
        }

        gameLoop();
    </script>
</body>
</html>
